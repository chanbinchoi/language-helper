<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KokoLang (ココラン) - 母音キャッチ！</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;800;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --ink: #273238;
            --muted: #64727a;
            --panel: #ffffff;
            --line: #d9e1e6;
            --green: #1f9d55;
            --green-dark: #13723b;
            --yellow: #f4c542;
            --red: #e25555;
            --blue: #2563eb;
            --bg: #f5f7fa;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Zen Maru Gothic", "Nunito", "Jua", sans-serif;
            color: var(--ink);
            background: var(--bg);
        }

        button {
            font: inherit;
        }

        .hud {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            min-height: 68px;
            padding: 12px clamp(16px, 4vw, 42px);
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(39, 50, 56, 0.08);
        }

        .brand {
            color: var(--green-dark);
            font-size: clamp(19px, 3vw, 28px);
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .hud-stats {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hud-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quit-button {
            min-height: 48px;
            padding: 10px 16px;
            border: 2px solid #ffc5a6;
            border-radius: 8px;
            color: #8f3f22;
            background: #fff0e8;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #f0aa82, 0 12px 20px rgba(194, 102, 64, 0.14);
            transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
            white-space: nowrap;
        }

        .quit-button:hover {
            filter: brightness(1.03);
            transform: translateY(-2px);
        }

        .quit-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f0aa82, 0 7px 14px rgba(194, 102, 64, 0.12);
        }

        .stat {
            min-width: 112px;
            padding: 8px 14px;
            border: 2px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            text-align: left;
        }

        .stat-label {
            display: block;
            color: var(--muted);
            font-family: "Nunito", sans-serif;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .stat-value {
            display: block;
            margin-top: 2px;
            font-size: 20px;
            font-weight: 900;
            line-height: 1;
        }

        main {
            width: min(94vw, 900px);
            margin: 0 auto;
            padding: clamp(24px, 5vw, 48px) 0 56px;
        }

        .game-shell {
            display: grid;
            gap: 24px;
        }

        .lesson-panel {
            padding: clamp(22px, 5vw, 42px);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 44px rgba(39, 50, 56, 0.1);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            color: var(--ink);
            font-size: clamp(26px, 5vw, 44px);
            font-weight: 900;
            line-height: 1.2;
        }

        .instruction {
            max-width: 620px;
            margin: 0 auto 26px;
            color: var(--muted);
            font-size: clamp(16px, 2.5vw, 20px);
            font-weight: 800;
            line-height: 1.55;
        }

        .listen-card {
            display: grid;
            gap: 16px;
            width: min(100%, 460px);
            margin: 0 auto;
        }

        .listen-button {
            display: inline-flex;
            min-height: 92px;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 0;
            border-radius: 8px;
            color: #ffffff;
            font-size: clamp(28px, 6vw, 44px);
            font-weight: 900;
            cursor: pointer;
            background: var(--green);
            box-shadow: 0 8px 0 var(--green-dark), 0 16px 26px rgba(31, 157, 85, 0.2);
            transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
        }

        .listen-button:hover {
            filter: brightness(1.04);
            transform: translateY(-2px);
        }

        .listen-button:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 var(--green-dark), 0 9px 18px rgba(31, 157, 85, 0.16);
        }

        .hint-box {
            padding: 14px 16px;
            border: 2px solid #e4ebef;
            border-radius: 8px;
            color: #40505a;
            background: #f8fafb;
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 900;
        }

        .options-panel {
            padding: clamp(18px, 4vw, 28px);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 14px 34px rgba(39, 50, 56, 0.08);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(128px, 1fr));
            gap: clamp(14px, 3vw, 20px);
            width: min(100%, 520px);
            margin: 0 auto;
        }

        .option-button {
            display: grid;
            aspect-ratio: 1 / 1;
            min-height: 128px;
            place-items: center;
            border: 3px solid #cdd8de;
            border-radius: 8px;
            color: var(--ink);
            background: #ffffff;
            font-family: "Jua", "Zen Maru Gothic", sans-serif;
            font-size: clamp(54px, 12vw, 88px);
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #c8d4da;
            transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
        }

        .option-button:hover:not(:disabled) {
            transform: translateY(-3px);
            border-color: var(--blue);
            box-shadow: 0 11px 0 #b7c4cb;
        }

        .option-button:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #c8d4da;
        }

        .option-button.correct {
            border-color: var(--green);
            color: var(--green-dark);
            background: #eaf8ef;
            box-shadow: 0 8px 0 #9ad5b2;
        }

        .option-button.wrong {
            border-color: var(--red);
            color: #a43737;
            background: #fff0f0;
            box-shadow: 0 8px 0 #efb3b3;
        }

        .option-button:disabled {
            cursor: default;
        }

        .feedback {
            min-height: 34px;
            margin: 18px 0 0;
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 900;
        }

        .feedback.correct {
            color: var(--green-dark);
        }

        .feedback.wrong {
            color: #b23a3a;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: none;
            padding: 22px;
            place-items: center;
            background: rgba(18, 26, 32, 0.58);
        }

        .modal-overlay.show {
            display: grid;
        }

        .modal {
            width: min(100%, 460px);
            padding: clamp(24px, 6vw, 40px);
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .modal h2 {
            margin: 0 0 12px;
            color: var(--green-dark);
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 900;
        }

        .modal p {
            margin: 0 0 26px;
            color: var(--ink);
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 900;
        }

        .home-button {
            display: inline-flex;
            min-height: 52px;
            padding: 12px 22px;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #ffffff;
            background: var(--green);
            font-size: 18px;
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 6px 0 var(--green-dark);
        }

        @media (max-width: 620px) {
            .hud {
                align-items: stretch;
                flex-direction: column;
            }

            .hud-stats {
                width: 100%;
            }

            .hud-actions {
                width: 100%;
                align-items: stretch;
                flex-direction: column;
            }

            .quit-button {
                width: 100%;
            }

            .stat {
                flex: 1;
                min-width: 0;
            }

            .options-grid {
                gap: 12px;
            }

            .option-button {
                min-height: 112px;
            }
        }
    </style>
</head>
<body>
<header class="hud" aria-label="ゲーム情報">
    <a class="brand" href="/">KokoLang <span>(ココラン)</span></a>
    <div class="hud-actions">
        <div class="hud-stats">
            <div class="stat">
                <span class="stat-label">Score</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Stage</span>
                <span id="stage" class="stat-value">1 / 10</span>
            </div>
        </div>
        <button id="quitButton" class="quit-button" type="button">🏠 メインへ</button>
    </div>
</header>

<main>
    <section class="game-shell" aria-label="母音キャッチ！ゲーム">
        <div class="lesson-panel">
            <h1>母音キャッチ！</h1>
            <p class="instruction">音を聞いて、ヒントに合う韓国語の母音を選ぼう。自動再生されない時はスピーカーを押してね。</p>
            <div class="listen-card">
                <button id="listenButton" class="listen-button" type="button" aria-label="韓国語の母音を聞く">
                    <span aria-hidden="true">🔊</span>
                    <span>聞く</span>
                </button>
                <div class="hint-box">
                    <span id="pronunciationHint">オ (eo)</span>
                </div>
            </div>
        </div>

        <div class="options-panel">
            <div id="optionsGrid" class="options-grid" aria-label="母音の選択肢"></div>
            <p id="feedback" class="feedback" aria-live="polite"></p>
        </div>
    </section>
</main>

<div id="clearModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
    <div class="modal">
        <h2 id="clearTitle">ゲームクリア！🎉</h2>
        <p id="finalScore">最終スコア：0点</p>
        <a class="home-button" href="/">メイン画面に戻る 🏠</a>
    </div>
</div>

<script>
    const questions = [
        { target: 'ㅏ', hint: 'ア (a)', options: ['ㅏ', 'ㅓ', 'ㅗ', 'ㅜ'] },
        { target: 'ㅓ', hint: 'オ (eo)', options: ['ㅓ', 'ㅗ', 'ㅏ', 'ㅡ'] },
        { target: 'ㅗ', hint: 'オ (o)', options: ['ㅗ', 'ㅜ', 'ㅓ', 'ㅣ'] },
        { target: 'ㅜ', hint: 'ウ (u)', options: ['ㅜ', 'ㅡ', 'ㅗ', 'ㅏ'] },
        { target: 'ㅡ', hint: 'ウ (eu)', options: ['ㅡ', 'ㅜ', 'ㅣ', 'ㅓ'] },
        { target: 'ㅣ', hint: 'イ (i)', options: ['ㅣ', 'ㅏ', 'ㅡ', 'ㅗ'] },
        { target: 'ㅐ', hint: 'エ (ae)', options: ['ㅐ', 'ㅔ', 'ㅏ', 'ㅓ'] },
        { target: 'ㅔ', hint: 'エ (e)', options: ['ㅔ', 'ㅐ', 'ㅗ', 'ㅜ'] },
        { target: 'ㅑ', hint: 'ヤ (ya)', options: ['ㅑ', 'ㅕ', 'ㅏ', 'ㅓ'] },
        { target: 'ㅕ', hint: 'ヨ (yeo)', options: ['ㅕ', 'ㅛ', 'ㅓ', 'ㅗ'] }
    ];

    const scoreElement = document.getElementById('score');
    const stageElement = document.getElementById('stage');
    const hintElement = document.getElementById('pronunciationHint');
    const listenButton = document.getElementById('listenButton');
    const optionsGrid = document.getElementById('optionsGrid');
    const feedback = document.getElementById('feedback');
    const clearModal = document.getElementById('clearModal');
    const finalScore = document.getElementById('finalScore');
    const quitButton = document.getElementById('quitButton');

    let currentIndex = 0;
    let score = 0;
    let canChoose = true;

    function shuffle(items) {
        return [...items].sort(() => Math.random() - 0.5);
    }

    function speakCurrentVowel() {
        const question = questions[currentIndex];

        if (!('speechSynthesis' in window)) {
            feedback.textContent = 'このブラウザは音声読み上げに対応していません。ヒントを見て選んでね。';
            feedback.className = 'feedback wrong';
            return;
        }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(question.target);
        utterance.lang = 'ko-KR';
        utterance.rate = 0.78;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
    }

    function renderQuestion() {
        const question = questions[currentIndex];
        canChoose = true;

        scoreElement.textContent = String(score);
        stageElement.textContent = `${currentIndex + 1} / ${questions.length}`;
        hintElement.textContent = question.hint;
        feedback.textContent = '';
        feedback.className = 'feedback';
        optionsGrid.innerHTML = '';

        shuffle(question.options).forEach((option) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'option-button';
            button.textContent = option;
            button.setAttribute('aria-label', `${option} を選ぶ`);
            button.addEventListener('click', () => chooseOption(option, button));
            optionsGrid.appendChild(button);
        });
    }

    function chooseOption(option, button) {
        if (!canChoose) {
            return;
        }

        const question = questions[currentIndex];

        if (option === question.target) {
            canChoose = false;
            score += 10;
            scoreElement.textContent = String(score);
            button.classList.add('correct');
            disableOptions();
            feedback.textContent = '정답(正解)!';
            feedback.className = 'feedback correct';

            window.setTimeout(() => {
                currentIndex += 1;
                if (currentIndex >= questions.length) {
                    showClearModal();
                } else {
                    renderQuestion();
                }
            }, 850);
        } else {
            button.classList.add('wrong');
            button.disabled = true;
            feedback.textContent = '오답(不正解)! もう一度聞いて、正しい母音を選んでね。';
            feedback.className = 'feedback wrong';
        }
    }

    function disableOptions() {
        optionsGrid.querySelectorAll('button').forEach((button) => {
            button.disabled = true;
        });
    }

    function showClearModal() {
        stageElement.textContent = `${questions.length} / ${questions.length}`;
        finalScore.textContent = `最終スコア：${score}点`;
        clearModal.classList.add('show');
    }

    listenButton.addEventListener('click', speakCurrentVowel);
    quitButton.addEventListener('click', () => {
        if (window.confirm('ゲームをやめてメイン画面に戻りますか？')) {
            window.location.href = '/';
        }
    });
    renderQuestion();
</script>
</body>
</html>
