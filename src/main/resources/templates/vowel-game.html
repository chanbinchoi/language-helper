<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母音の雑草ぬき</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;800;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "Zen Maru Gothic", "Nunito", "Jua", sans-serif;
            color: #684c37;
            text-align: center;
            background:
                radial-gradient(circle at 14% 14%, rgba(255, 255, 255, 0.8) 0 7%, transparent 8%),
                radial-gradient(circle at 88% 18%, rgba(255, 232, 178, 0.82) 0 8%, transparent 9%),
                linear-gradient(140deg, #fff8d7 0%, #ffe0ed 48%, #d7f7d1 100%);
        }

        main {
            position: relative;
            z-index: 1;
            width: min(94vw, 980px);
            margin: 0 auto;
            padding: 34px 18px 56px;
        }

        .deco {
            position: fixed;
            z-index: 0;
            font-size: clamp(30px, 5vw, 66px);
            filter: drop-shadow(0 8px 10px rgba(184, 128, 93, 0.16));
            animation: float 4.5s ease-in-out infinite;
            pointer-events: none;
        }

        .deco.one {
            top: 7%;
            left: 5%;
        }

        .deco.two {
            top: 9%;
            right: 7%;
            animation-delay: 0.8s;
        }

        .deco.three {
            bottom: 7%;
            left: 6%;
            animation-delay: 1.3s;
        }

        .deco.four {
            right: 6%;
            bottom: 8%;
            animation-delay: 1.9s;
        }

        .game-header {
            margin: 0 auto 24px;
            padding: 22px clamp(18px, 4vw, 42px);
            border: 5px solid rgba(255, 255, 255, 0.84);
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.74);
            box-shadow: 0 14px 0 rgba(239, 180, 106, 0.26), 0 20px 34px rgba(150, 105, 78, 0.16);
            backdrop-filter: blur(7px);
        }

        h1 {
            margin: 0 0 12px;
            color: #ff7c68;
            font-size: clamp(30px, 5vw, 54px);
            font-weight: 900;
            line-height: 1.18;
            text-shadow: 0 4px 0 #fff0b5;
        }

        .hint {
            margin: 0;
            color: #7b5b42;
            font-size: clamp(17px, 2.8vw, 24px);
            font-weight: 900;
        }

        .target-wrap {
            margin: 28px 0 34px;
        }

        .target-label {
            display: inline-block;
            margin-bottom: 12px;
            padding: 9px 20px;
            border-radius: 999px;
            color: #f77697;
            font-size: clamp(17px, 2.8vw, 24px);
            font-weight: 900;
            background: #fff2f7;
            box-shadow: inset 0 -5px 0 rgba(255, 190, 205, 0.48);
        }

        .target {
            display: grid;
            width: clamp(132px, 22vw, 190px);
            height: clamp(132px, 22vw, 190px);
            margin: 0 auto;
            place-items: center;
            border: 7px solid #ffffff;
            border-radius: 44px;
            color: #4f8f41;
            font-family: "Jua", "Zen Maru Gothic", sans-serif;
            font-size: clamp(76px, 14vw, 128px);
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 0%, #fff8d7 100%);
            box-shadow: 0 15px 0 #f5ca75, 0 24px 36px rgba(160, 111, 67, 0.2);
        }

        .garden {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
            gap: 18px;
            max-width: 760px;
            margin: 0 auto;
            padding: 22px;
            border: 5px solid rgba(255, 255, 255, 0.7);
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.48);
            box-shadow: inset 0 -9px 0 rgba(143, 207, 121, 0.22), 0 16px 28px rgba(128, 96, 67, 0.14);
        }

        .vowel-button {
            position: relative;
            min-height: 96px;
            border: 0;
            border-radius: 30px;
            color: #ffffff;
            font-family: "Jua", "Zen Maru Gothic", sans-serif;
            font-size: clamp(42px, 7vw, 62px);
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(180deg, #9be67a 0%, #61bf54 100%);
            box-shadow: 0 10px 0 #479745, 0 15px 22px rgba(87, 132, 65, 0.2);
            text-shadow: 0 3px 0 rgba(53, 121, 55, 0.25);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .vowel-button:nth-child(3n) {
            background: linear-gradient(180deg, #ffb7ca 0%, #ff83a4 100%);
            box-shadow: 0 10px 0 #d96986, 0 15px 22px rgba(171, 93, 114, 0.18);
        }

        .vowel-button:nth-child(4n) {
            background: linear-gradient(180deg, #ffd66f 0%, #ffb84f 100%);
            box-shadow: 0 10px 0 #d9943f, 0 15px 22px rgba(172, 126, 60, 0.18);
        }

        .vowel-button::after {
            position: absolute;
            right: 12px;
            bottom: 8px;
            content: "🌱";
            font-size: 22px;
            text-shadow: none;
        }

        .vowel-button:hover {
            transform: translateY(-5px) scale(1.08);
            filter: brightness(1.04);
            animation: bounce 0.42s ease-in-out;
        }

        .vowel-button:active {
            transform: translateY(5px) scale(0.98);
            box-shadow: 0 5px 0 #479745, 0 10px 16px rgba(87, 132, 65, 0.16);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(-4deg);
            }

            50% {
                transform: translateY(-13px) rotate(5deg);
            }
        }

        @keyframes bounce {
            0%, 100% {
                rotate: 0deg;
            }

            35% {
                rotate: -3deg;
            }

            70% {
                rotate: 3deg;
            }
        }
    </style>
</head>
<body>
<span class="deco one" aria-hidden="true">🌸</span>
<span class="deco two" aria-hidden="true">🌻</span>
<span class="deco three" aria-hidden="true">🍀</span>
<span class="deco four" aria-hidden="true">🌷</span>

<main>
    <header class="game-header">
        <h1>母音の雑草ぬき 🌱</h1>
        <p class="hint">お手本と同じ韓国語の母音をタップしよう！</p>
    </header>

    <section class="target-wrap" aria-label="お手本の母音">
        <div class="target-label">今日のお手本</div>
        <div id="targetVowel" class="target">ㅓ</div>
    </section>

    <section id="garden" class="garden" aria-label="母音を選ぶ場所"></section>
</main>

<script>
    const targetVowel = 'ㅓ';
    const vowels = ['ㅓ', 'ㅗ', 'ㅏ', 'ㅜ', 'ㅡ', 'ㅣ', 'ㅓ', 'ㅏ', 'ㅗ', 'ㅓ', 'ㅜ', 'ㅣ'];
    const garden = document.getElementById('garden');
    const target = document.getElementById('targetVowel');

    target.textContent = targetVowel;

    vowels
        .sort(() => Math.random() - 0.5)
        .forEach((vowel) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'vowel-button';
            button.textContent = vowel;
            button.setAttribute('aria-label', vowel + ' を選ぶ');
            button.addEventListener('click', () => {
                if (vowel === targetVowel) {
                    alert('せいかい！きれいなお花が育ったよ！🌱');
                } else {
                    alert('あっ、雑草だったみたい！もう一度さがしてみよう！💦');
                }
            });
            garden.appendChild(button);
        });
</script>
</body>
</html>
